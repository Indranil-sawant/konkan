{% extends 'base.html'%}

{}
<div class="max-w-sm mx-auto mt-10">
    <div class="bg-white shadow-xl rounded-2xl overflow-hidden">

        <!-- Header Image -->
        <div class="h-32 bg-gradient-to-r from-blue-500 to-purple-600"></div>

        <div class="p-6 -mt-16 flex flex-col items-center">
            <!-- Profile Image -->
            <img src="{{ profile.profile_image.url }}"
                 alt="{{ profile.name }}"
                 class="w-28 h-28 rounded-full border-4 border-white shadow-md object-cover">

            <!-- Name + Intro -->
            <h2 class="mt-4 text-2xl font-semibold text-gray-900">
                {{ profile.name }}
            </h2>
            <p class="text-gray-600">{{ profile.short_intro }}</p>

            <!-- Bio -->
            <p class="text-gray-700 text-center mt-3 text-sm leading-relaxed">
                {{ profile.bio|truncatechars:150 }}
            </p>

            <!-- Social Icons -->
            <div class="flex space-x-4 mt-4">

                {% if profile.social_github %}
                <a href="{{ profile.social_github }}" target="_blank"
                   class="text-gray-700 hover:text-black text-xl">
                    <i class="fa-brands fa-github"></i>
                </a>
                {% endif %}

                {% if profile.social_linkedin %}
                <a href="{{ profile.social_linkedin }}" target="_blank"
                   class="text-blue-700 hover:text-blue-900 text-xl">
                    <i class="fa-brands fa-linkedin"></i>
                </a>
                {% endif %}

                {% if profile.social_twitter %}
                <a href="{{ profile.social_twitter }}" target="_blank"
                   class="text-blue-500 hover:text-blue-700 text-xl">
                    <i class="fa-brands fa-x-twitter"></i>
                </a>
                {% endif %}

                {% if profile.social_website %}
                <a href="{{ profile.social_website }}" target="_blank"
                   class="text-green-600 hover:text-green-800 text-xl">
                    <i class="fa-solid fa-globe"></i>
                </a>
                {% endif %}
            </div>

            <!-- Buttons -->
            <div class="mt-6 w-full">
                <a href="#" class="block text-center bg-blue-600 text-white py-2 rounded-xl shadow hover:bg-blue-700">
                    Contact
                </a>
            </div>

        </div>
    </div>
</div>
