{% extends "base.html" %}


{% block content %}
<div class="container py-4">
    <h1 class="mb-4">Spots</h1>

    <div class="row g-4">
        {% for item in context.spots %}
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card shadow-sm h-100">
                {% if item.image_url %}
                    <img src="{{ item.image_url }}" class="card-img-top" alt="{{ item.name }}">
                {% endif %}

                <div class="card-body">
                    <h5 class="card-title">{{ item.name }}</h5>
                    <p class="card-text text-muted">
                        {{ item.short_desc|default:"No description available." }}
                    </p>

                    <a href="{% url 'details' pk=item.id %}" class="btn btn-primary btn-sm">
                        View Details
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</div>
{% endblock content %}
